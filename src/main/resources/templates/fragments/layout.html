<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<!--
    Fragmento reutilizable del layout principal del sistema.
    Aquí se define el head general y la barra de navegación.
-->

<head th:fragment="head(title)">

    <!-- Configuración de caracteres especiales -->
    <meta charset="UTF-8">

    <!-- Hace que el diseño sea responsive en dispositivos móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--
        Título dinámico usando Thymeleaf.
        Cada página puede enviar su propio título.
    -->
    <title th:text="${title} + ' | Escape Planner'">
        Escape Planner
    </title>

    <!-- Framework Bootstrap para estilos y componentes -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Hoja de estilos personalizada del proyecto -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">

</head>

<body>

<!--
    Fragmento reutilizable de la barra de navegación.
    El parámetro "active" sirve para marcar la sección activa.
-->
<nav class="navbar navbar-expand-lg navbar-dark app-navbar"
     th:fragment="navbar(active)">

    <div class="container">

        <!-- Logo y nombre principal del sistema -->
        <a class="navbar-brand d-flex align-items-center gap-2"
           th:href="@{/dashboard}">

            <!-- Logo del sistema -->
            <img th:src="@{/img/logo.png}"
                 alt="Escape Planner"
                 class="nav-logo">

            <!-- Nombre del proyecto -->
            <span>Escape Planner</span>

        </a>

        <!--
            Botón hamburguesa para dispositivos móviles.
            Bootstrap lo utiliza para mostrar u ocultar el menú.
        -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavbar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Contenedor colapsable del menú -->
        <div class="collapse navbar-collapse" id="mainNavbar">

            <!-- Menú principal alineado hacia la derecha -->
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">

                <!-- Opción Dashboard -->
                <li class="nav-item">

                    <a class="nav-link"
                       th:classappend="${active == 'dashboard'} ? 'active'"
                       th:href="@{/dashboard}">

                        Dashboard

                    </a>

                </li>

                <!-- Opción Clientes -->
                <li class="nav-item">

                    <a class="nav-link"
                       th:classappend="${active == 'clientes'} ? 'active'"
                       th:href="@{/clientes}">

                        Clientes

                    </a>

                </li>

                <!-- Opción Eventos -->
                <li class="nav-item">

                    <a class="nav-link"
                       th:classappend="${active == 'eventos'} ? 'active'"
                       th:href="@{/eventos}">

                        Eventos

                    </a>

                </li>

                <!-- Acceso directo a la API REST -->
                <li class="nav-item">

                    <a class="nav-link"
                       href="/api/clientes"
                       target="_blank">

                        API REST

                    </a>

                </li>

            </ul>
        </div>
    </div>
</nav>

<!--
    Script principal de Bootstrap.
    Permite el funcionamiento de componentes interactivos
    como el menú responsive.
-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
