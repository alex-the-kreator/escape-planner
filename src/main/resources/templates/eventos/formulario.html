<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nuevo Evento')}"></head>
<body class="app-page">
<nav th:replace="~{fragments/layout :: navbar('eventos')}"></nav>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-xl-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <p class="section-kicker">Modulo web</p>
                    <h1 class="h2 mb-1" th:text="${formTitle}">Registrar evento</h1>
                    <p class="text-muted mb-0">Formulario temporal conectado a la misma logica de negocio de la API REST.</p>
                </div>
                <a class="btn btn-outline-secondary" th:href="@{/eventos}">Volver</a>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <form th:action="${formAction}" th:object="${eventoRequest}" method="post" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="clienteBusqueda" class="form-label">Cliente</label>
                                <input type="hidden" id="clienteId" th:field="*{clienteId}">
                                <input
                                        type="text"
                                        id="clienteBusqueda"
                                        class="form-control"
                                        placeholder="Buscar por cedula, nombre, telefono, email o canal"
                                        autocomplete="off"
                                >
                                <div class="form-text">La busqueda actual funciona con cedula, nombre, telefono, email y canal de contacto.</div>
                                <div id="clienteSeleccionado" class="selected-client-box mt-2 d-none"></div>
                                <div id="clienteResultados" class="client-search-results mt-2"></div>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('clienteId')}" th:errors="*{clienteId}"></div>
                            </div>

                            <div class="col-md-6">
                                <label for="usuarioId" class="form-label">Asesor responsable</label>
                                <select id="usuarioId" class="form-select" th:field="*{usuarioId}">
                                    <option value="">Selecciona un usuario</option>
                                    <option th:each="usuario : ${usuarios}" th:value="${usuario.id}" th:text="${usuario.nombre + ' - ' + usuario.rol}"></option>
                                </select>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('usuarioId')}" th:errors="*{usuarioId}"></div>
                            </div>

                            <div class="col-md-4">
                                <label for="tipo" class="form-label">Tipo de evento</label>
                                <select id="tipo" class="form-select" th:field="*{tipo}">
                                    <option th:each="tipo : ${tiposEvento}" th:value="${tipo}" th:text="${tipo}"></option>
                                </select>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></div>
                            </div>

                            <div class="col-md-4">
                                <label for="fecha" class="form-label">Fecha</label>
                                <input type="date" id="fecha" class="form-control" th:field="*{fecha}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></div>
                            </div>

                            <div class="col-md-4">
                                <label for="sede" class="form-label">Sede</label>
                                <select id="sede" class="form-select" th:field="*{sede}">
                                    <option value="">Selecciona una sede</option>
                                    <option th:each="sede : ${sedesEvento}" th:value="${sede}" th:text="${sede.nombreVisible}"></option>
                                </select>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('sede')}" th:errors="*{sede}"></div>
                            </div>

                            <div class="col-md-4">
                                <label for="numPersonas" class="form-label">Numero de personas</label>
                                <input type="number" id="numPersonas" class="form-control" min="1" th:field="*{numPersonas}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('numPersonas')}" th:errors="*{numPersonas}"></div>
                            </div>

                            <div class="col-md-4">
                                <label for="horaInicio" class="form-label">Hora de inicio</label>
                                <input type="time" id="horaInicio" class="form-control" th:field="*{horaInicio}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('horaInicio')}" th:errors="*{horaInicio}"></div>
                            </div>

                            <div class="col-md-4">
                                <label for="horaFin" class="form-label">Hora de finalizacion</label>
                                <input type="time" id="horaFin" class="form-control" th:field="*{horaFin}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('horaFin')}" th:errors="*{horaFin}"></div>
                            </div>

                            <div class="col-md-4">
                                <label for="estado" class="form-label">Estado</label>
                                <select id="estado" class="form-select" th:field="*{estado}">
                                    <option th:each="estado : ${estadosEvento}" th:value="${estado}" th:text="${estado}"></option>
                                </select>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></div>
                            </div>

                            <div class="col-md-4">
                                <label for="requiereBloqueo" class="form-label">Requiere bloqueo</label>
                                <select id="requiereBloqueo" class="form-select" th:field="*{requiereBloqueo}">
                                    <option th:value="true">Si</option>
                                    <option th:value="false">No</option>
                                </select>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('requiereBloqueo')}" th:errors="*{requiereBloqueo}"></div>
                            </div>

                            <div class="col-12">
                                <label for="detallesLogisticos" class="form-label">Detalles logisticos</label>
                                <textarea id="detallesLogisticos" class="form-control" rows="4" th:field="*{detallesLogisticos}"></textarea>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('detallesLogisticos')}" th:errors="*{detallesLogisticos}"></div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a class="btn btn-outline-secondary" th:href="@{/eventos}">Cancelar</a>
                            <button type="submit" class="btn btn-primary" th:text="${submitLabel}">Guardar evento</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script th:inline="javascript">
    const clientesDisponibles = [
        /*[# th:each="cliente, clienteStat : ${clientes}"]*/
        {
            id: [[${cliente.id}]],
            cedula: [[${cliente.cedula}]],
            nombre: [[${cliente.nombre}]],
            telefono: [[${cliente.telefono}]],
            email: [[${cliente.email}]],
            canalContacto: [[${cliente.canalContacto}]]
        }/*[# th:if="${!clienteStat.last}"]*/,/*[/]*/
        /*[/]*/
    ];

    const clienteIdInput = document.getElementById('clienteId');
    const clienteBusquedaInput = document.getElementById('clienteBusqueda');
    const clienteResultados = document.getElementById('clienteResultados');
    const clienteSeleccionado = document.getElementById('clienteSeleccionado');

    function construirTextoBusqueda(cliente) {
        return [
            cliente.cedula ?? '',
            cliente.nombre ?? '',
            cliente.telefono ?? '',
            cliente.email ?? '',
            cliente.canalContacto ?? ''
        ].join(' ').toLowerCase();
    }

    function pintarClienteSeleccionado(cliente) {
        if (!cliente) {
            clienteSeleccionado.classList.add('d-none');
            clienteSeleccionado.innerHTML = '';
            return;
        }

        clienteSeleccionado.classList.remove('d-none');
        clienteSeleccionado.innerHTML = `
            <strong>Cliente seleccionado:</strong> ${cliente.nombre}<br>
            <span class="text-muted small">
                Cedula: ${cliente.cedula}
                ${cliente.telefono ? ' | Telefono: ' + cliente.telefono : ''}
                ${cliente.email ? ' | Email: ' + cliente.email : ''}
                ${cliente.canalContacto ? ' | Canal: ' + cliente.canalContacto : ''}
            </span>
        `;
    }

    function seleccionarCliente(cliente) {
        clienteIdInput.value = cliente.id;
        clienteBusquedaInput.value = `${cliente.cedula} - ${cliente.nombre}`;
        pintarClienteSeleccionado(cliente);
        clienteResultados.innerHTML = '';
    }

    function buscarCoincidenciaExacta(termino) {
        const texto = termino.trim().toLowerCase();

        if (!texto) {
            return null;
        }

        return clientesDisponibles.find(cliente =>
            (cliente.cedula ?? '').toLowerCase() === texto
            || (cliente.nombre ?? '').toLowerCase() === texto
            || (cliente.telefono ?? '').toLowerCase() === texto
            || (cliente.email ?? '').toLowerCase() === texto
            || (cliente.canalContacto ?? '').toLowerCase() === texto
        ) ?? null;
    }

    function renderizarResultados(termino) {
        const texto = termino.trim().toLowerCase();

        if (!texto) {
            clienteResultados.innerHTML = '';
            return;
        }

        const coincidencias = clientesDisponibles
            .filter(cliente => construirTextoBusqueda(cliente).includes(texto))
            .slice(0, 8);

        if (coincidencias.length === 0) {
            clienteResultados.innerHTML = '<div class="search-empty-state">No se encontraron clientes con ese criterio.</div>';
            return;
        }

        clienteResultados.innerHTML = coincidencias.map(cliente => `
            <button type="button" class="search-result-item" data-cliente-id="${cliente.id}">
                <span class="fw-semibold">${cliente.cedula} - ${cliente.nombre}</span>
                <span class="small text-muted">
                    ${cliente.telefono || 'Sin telefono'}
                    ${cliente.email ? ' | ' + cliente.email : ''}
                    ${cliente.canalContacto ? ' | ' + cliente.canalContacto : ''}
                </span>
            </button>
        `).join('');

        document.querySelectorAll('.search-result-item').forEach(boton => {
            boton.addEventListener('click', () => {
                const cliente = clientesDisponibles.find(item => item.id === Number(boton.dataset.clienteId));
                seleccionarCliente(cliente);
            });
        });
    }

    clienteBusquedaInput.addEventListener('input', (event) => {
        const termino = event.target.value;
        const coincidenciaExacta = buscarCoincidenciaExacta(termino);

        if (coincidenciaExacta) {
            seleccionarCliente(coincidenciaExacta);
            return;
        }

        clienteIdInput.value = '';
        pintarClienteSeleccionado(null);
        renderizarResultados(termino);
    });

    const clienteInicial = clientesDisponibles.find(cliente => cliente.id === Number(clienteIdInput.value));
    if (clienteInicial) {
        clienteBusquedaInput.value = `${clienteInicial.cedula} - ${clienteInicial.nombre}`;
        pintarClienteSeleccionado(clienteInicial);
    }
</script>

</body>
</html>
