<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nuevo Cliente')}"></head>
<body class="app-page">
<nav th:replace="~{fragments/layout :: navbar('clientes')}"></nav>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <p class="section-kicker">Modulo web</p>
                    <h1 class="h2 mb-1">Registrar cliente</h1>
                    <p class="text-muted mb-0">Formulario temporal para pruebas funcionales con Thymeleaf.</p>
                </div>
                <a class="btn btn-outline-secondary" th:href="@{/clientes}">Volver</a>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <form th:action="@{/clientes/guardar}" th:object="${clienteRequest}" method="post" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="cedula" class="form-label">Cedula</label>
                                <input type="text" id="cedula" class="form-control" th:field="*{cedula}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('cedula')}" th:errors="*{cedula}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" id="nombre" class="form-control" th:field="*{nombre}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="telefono" class="form-label">Telefono</label>
                                <input type="text" id="telefono" class="form-control" th:field="*{telefono}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" class="form-control" th:field="*{email}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="canalContacto" class="form-label">Canal de contacto</label>
                                <input type="text" id="canalContacto" class="form-control" th:field="*{canalContacto}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('canalContacto')}" th:errors="*{canalContacto}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="estado" class="form-label">Estado</label>
                                <select id="estado" class="form-select" th:field="*{estado}">
                                    <option th:each="estado : ${estadosCliente}" th:value="${estado}" th:text="${estado}"></option>
                                </select>
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a class="btn btn-outline-secondary" th:href="@{/clientes}">Cancelar</a>
                            <button type="submit" class="btn btn-primary">Guardar cliente</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
