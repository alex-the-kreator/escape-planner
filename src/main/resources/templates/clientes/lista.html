<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Clientes')}"></head>
<body class="app-page">
<nav th:replace="~{fragments/layout :: navbar('clientes')}"></nav>
<main class="container py-5">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <p class="section-kicker">Modulo web</p>
            <h1 class="h2 mb-1">Clientes</h1>
            <p class="text-muted mb-0">Listado general de clientes registrados en Escape Planner.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/clientes/nuevo}">Nuevo cliente</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Cedula</th>
                    <th>Nombre</th>
                    <th>Telefono</th>
                    <th>Email</th>
                    <th>Canal de contacto</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(clientes)}">
                    <td colspan="8" class="text-center text-muted py-4">Aun no hay clientes registrados.</td>
                </tr>
                <tr th:each="cliente : ${clientes}">
                    <td th:text="${cliente.id}"></td>
                    <td th:text="${cliente.cedula}"></td>
                    <td th:text="${cliente.nombre}"></td>
                    <td th:text="${cliente.telefono}"></td>
                    <td th:text="${cliente.email}"></td>
                    <td th:text="${cliente.canalContacto}"></td>
                    <td>
                        <span class="badge rounded-pill text-bg-success" th:if="${cliente.estado.name() == 'ACTIVO'}" th:text="${cliente.estado}"></span>
                        <span class="badge rounded-pill text-bg-secondary" th:if="${cliente.estado.name() == 'INACTIVO'}" th:text="${cliente.estado}"></span>
                    </td>
                    <td>
                        <div class="d-flex gap-2">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/clientes/{id}/editar(id=${cliente.id})}">Editar</a>
                            <form th:action="@{/clientes/{id}/eliminar(id=${cliente.id})}" method="post" class="m-0">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
