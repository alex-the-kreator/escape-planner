<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Eventos')}"></head>
<body class="app-page">
<nav th:replace="~{fragments/layout :: navbar('eventos')}"></nav>
<main class="container py-5">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <p class="section-kicker">Modulo web</p>
            <h1 class="h2 mb-1">Eventos</h1>
            <p class="text-muted mb-0">Listado de eventos.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/eventos/nuevo}">Nuevo evento</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Responsable</th>
                    <th>Tipo</th>
                    <th>Sede</th>
                    <th>Fecha</th>
                    <th>Horario</th>
                    <th>Personas</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(eventos)}">
                    <td colspan="10" class="text-center text-muted py-4">Aun no hay eventos registrados.</td>
                </tr>
                <tr th:each="evento : ${eventos}">
                    <td th:text="${evento.id}"></td>
                    <td th:text="${evento.cliente.nombre}"></td>
                    <td th:text="${evento.usuario.nombre}"></td>
                    <td th:text="${evento.tipo}"></td>
                    <td th:text="${evento.sede != null ? evento.sede.nombreVisible : 'Sin sede'}"></td>
                    <td th:text="${evento.fecha}"></td>
                    <td>
                        <span th:text="${evento.horaInicio}"></span>
                        <span>-</span>
                        <span th:text="${evento.horaFin}"></span>
                    </td>
                    <td th:text="${evento.numPersonas}"></td>
                    <td><span class="badge text-bg-warning" th:text="${evento.estado}"></span></td>
                    <td>
                        <div class="d-flex gap-2">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/eventos/{id}/editar(id=${evento.id})}">Editar</a>
                            <form th:action="@{/eventos/{id}/eliminar(id=${evento.id})}" method="post" class="m-0">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
