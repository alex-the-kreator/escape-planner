<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="login-page">
<div class="login-layout">
    <section class="login-form-side">
        <div class="login-form-card">
            <div class="login-branding text-center">
                <img th:src="@{/img/Logo.escape.png}" alt="Logo Escape Planner" class="login-brand-logo">
                <img th:src="@{/img/letras.escape.planner.png}" alt="Escape Planner" class="login-brand-text">
                <h1 class="login-title">Inicia sesi&oacute;n en tu cuenta</h1>
            </div>

            <form th:action="@{/login}" method="post" class="login-form">
                <div class="mb-3">
                    <label for="correo" class="form-label login-label">Correo</label>
                    <input type="email" class="form-control form-control-lg login-input" id="correo" name="correo" placeholder="asesor@escapeplanner.local" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label login-label">Contrase&ntilde;a</label>
                    <input type="password" class="form-control form-control-lg login-input" id="password" name="password" placeholder="Ingresa tu contrase&ntilde;a" required>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-lg login-button">Iniciar sesi&oacute;n</button>
                </div>
            </form>

            <div class="login-divider">
                <span>O</span>
            </div>

            <div class="d-grid">
                <button type="button" class="btn btn-lg login-button-secondary">Registrarse</button>
            </div>

            <div class="login-note mt-4 mb-0 text-center small">
                Acceso visual temporal para demostraci&oacute;n acad&eacute;mica. La autenticaci&oacute;n real se integrar&aacute; en una fase posterior.
            </div>
        </div>
    </section>

    <section class="login-visual-side">
        <div class="login-visual-content">
            <img th:src="@{/img/logo-principalpng.png}" alt="Logo principal Escape Planner" class="login-visual-logo">
        </div>
    </section>
</div>

<div class="creator-watermark">
    <div class="creator-watermark-logo-wrap">
        <img th:src="@{/img/logo_personal.png}" alt="Marca personal Alex-The-Kreator" class="creator-watermark-logo">
    </div>
    <div class="creator-watermark-text">by: Alex-The-Kreator</div>
</div>
</body>
</html>
